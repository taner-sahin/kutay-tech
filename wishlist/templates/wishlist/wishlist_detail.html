{% extends "base.html" %}

{% block content %}
<section class="container py-5">
  <h2 class="mb-4">Favorilerim</h2>

  <div class="row g-4">
    {% for item in wishlist_items %}
      <div class="col-sm-6 col-lg-3">
        <div class="card h-100">

          {% if item.product.image %}
            <img
              src="{{ item.product.image.url }}"
              alt="{{ item.product.name }}"
              class="card-img-top"
              style="height:340px; object-fit:contain; background:#070b10"
            >
          {% endif %}

          <div class="card-body d-flex flex-column">
            <h5>{{ item.product.name }}</h5>
            <p>{{ item.product.price }} TL</p>

            <div class="d-flex gap-2 mt-auto">
              <a
                href="{% url 'products:product_detail' item.product.slug %}"
                class="btn btn-dark btn-sm"
              >
                Ürünü Gör
              </a>

              <a
                href="{% url 'wishlist:remove_from_wishlist' item.product.id %}"
                class="btn btn-outline-danger btn-sm"
              >
                Favoriden Çıkar
              </a>
            </div>
          </div>

        </div>
      </div>
    {% empty %}
      <p>Favori ürününüz bulunmuyor.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
